<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>Farmacias de Turno · MDP</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0d1117;
      --surface:#161b22;
      --accent:#3fb950;
      --muted:#7d8590;
      --border:rgba(255,255,255,0.08);
      --radius:14px;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:Nunito, sans-serif;
      background:var(--bg);
      color:#e6edf3;
      display:flex;
      justify-content:center;
    }

    .app{
      width:100%;
      max-width:480px;
      padding:16px;
    }

    header{
      position:sticky;
      top:0;
      background:var(--bg);
      padding:14px 0;
      border-bottom:1px solid var(--border);
    }

    .title{
      font-family:"Bebas Neue", sans-serif;
      font-size:26px;
      letter-spacing:1px;
    }

    .sub{
      font-size:12px;
      color:var(--muted);
    }

    .fecha{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      text-align:center;
    }

    button{
      margin-top:10px;
      width:100%;
      background:var(--surface);
      border:none;
      color:#fff;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    button:hover{opacity:0.8}

    .card{
      background:var(--surface);
      border:1px solid var(--border);
      padding:14px;
      border-radius:var(--radius);
      margin-top:10px;
    }

    .name{
      font-weight:700;
      color:#fff;
      margin-bottom:4px;
    }

    .muted{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    .empty{
      text-align:center;
      margin-top:40px;
      color:var(--muted);
    }

    .badge{
      display:inline-block;
      margin-top:8px;
      font-size:11px;
      color:var(--accent);
    }

    .loading{
      text-align:center;
      margin-top:40px;
      color:var(--muted);
    }
  </style>
</head>

<body>

<div class="app">

  <header>
    <div class="title">Farmacias de Turno</div>
    <div class="sub">Mar del Plata</div>

    <div class="fecha" id="fecha">Cargando...</div>

    <button onclick="hoy()">Actualizar / Hoy</button>
  </header>

  <div id="lista" class="loading">Cargando datos...</div>

</div>

<script>
let data = {};
let fechas = [];
let fechaActual = "";

function format(d){
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

function render(fecha){

  document.getElementById("fecha").innerText = fecha;

  const lista = data[fecha] || [];
  const cont = document.getElementById("lista");

  if(lista.length === 0){
    cont.innerHTML = `<div class="empty">Sin farmacias para esta fecha</div>`;
    return;
  }

  cont.innerHTML = "";

  lista.forEach(f => {
    cont.innerHTML += `
      <div class="card">
        <div class="name">${f.farmacia}</div>
        <div class="muted">${f.direccion || ""}</div>
        <div class="muted">${f.telefono || ""}</div>
        <div class="badge">Turno activo</div>
      </div>
    `;
  });
}

function hoy(){
  const h = format(new Date());

  if(data[h]){
    fechaActual = h;
  } else {
    fechaActual = fechas[0];
  }

  render(fechaActual);
}

fetch("turnos_hasta_31_12.json")
  .then(r => r.json())
  .then(json => {

    data = json;

    fechas = Object.keys(data);

    hoy();

  })
  .catch(err => {
    document.getElementById("lista").innerHTML =
      "<div class='empty'>Error cargando datos</div>";
    console.error(err);
  });
</script>

</body>
</html>
