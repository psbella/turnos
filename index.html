<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Farmacias MDP">

  <title>Farmacias de Turno · Mar del Plata</title>

  <!-- Favicon cruz verde -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230d1117'/%3E%3Crect x='10' y='0' width='12' height='32' fill='%233fb950'/%3E%3Crect x='0' y='10' width='32' height='12' fill='%233fb950'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%230d1117'/%3E%3Crect x='10' y='0' width='12' height='32' fill='%233fb950'/%3E%3Crect x='0' y='10' width='32' height='12' fill='%233fb950'/%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --accent: #3fb950;
      --accent-dim: rgba(63,185,80,0.12);
      --text: #e6edf3;
      --muted: #7d8590;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; display: flex; flex-direction: column; }

    header { border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); z-index: 10; }

    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cross { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
    .cross::before, .cross::after { content: ''; position: absolute; background: var(--accent); border-radius: 3px; }
    .cross::before { width: 12px; height: 32px; left: 10px; top: 0; }
    .cross::after  { width: 32px; height: 12px; left: 0; top: 10px; }

    .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--text); letter-spacing: 1px; }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-left: 44px;
      letter-spacing: 1px;
    }

    .layout {
      max-width: 1100px; margin: 0 auto;
      padding: 24px 24px 60px;
      flex: 1;
    }

    @media (min-width: 768px) {
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }
    }

    .col-list { min-width: 0; }

    .intro {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    .intro strong { color: var(--accent); }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card:hover { border-color: rgba(63,185,80,0.35); background: #1a1f2a; }
    .card.active { border-color: var(--accent); background: var(--accent-dim); }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--accent);
      opacity: 0.7;
      min-width: 32px;
    }

    .card-info {
      flex: 1;
    }

    .card-name { font-weight: 700; font-size: 16px; }

    .card-address {
      font-size: 12px;
      color: var(--text);
      margin-top: 4px;
      opacity: 0.85;
    }

    .card-phone {
      font-size: 12px;
      text-align: right;
    }

    .phone-link {
      color: var(--accent);
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
    }

    .col-map { display: none; }

    @media (min-width: 768px) {
      .col-map {
        display: block;
        position: sticky;
        top: 90px;
      }
    }

    #map-desktop { height: 500px; width: 100%; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); background: #1a1f2a; }

    .map-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 20;
    }

    .map-sheet.open { transform: translateY(0); }

    .map-sheet-header {
      padding: 16px;
      font-weight: 700;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .map-sheet-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0 8px;
    }

    #map-mobile { height: 350px; width: 100%; background: #1a1f2a; }

    .stats {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }

    .footer {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .footer p {
      margin: 8px 0;
    }

    .gmaps-link {
      display: inline-block;
      margin-top: 8px;
      padding: 4px 8px;
      background: var(--accent);
      color: #0d1117;
      text-decoration: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="header-top">
      <div class="cross"></div>
      <div class="app-title">Farmacias de Turno</div>
    </div>
    <div class="subtitle">CIUDAD DE MAR DEL PLATA</div>
  </div>
</header>

<div class="layout">
  <div class="col-list">
    <div class="intro" id="intro">
      <span>Cargando datos...</span>
    </div>
    <div id="lista"></div>
  </div>

  <div class="col-map">
    <div id="map-desktop"></div>
  </div>
</div>

<div class="map-sheet" id="mapSheet">
  <div class="map-sheet-header">
    <span id="sheetName"></span>
    <button class="map-sheet-close" id="closeSheet">✕</button>
  </div>
  <div id="map-mobile"></div>
</div>

<footer class="footer">
  <p>📋 Datos obtenidos del <a href="http://colfarmamdp.com.ar/" target="_blank" rel="noopener noreferrer">Colegio de Farmacéuticos de Gral. Pueyrredon</a></p>
  <p>💻 Desarrollado por <a href="mailto:pablo.s.bella@gmail.com?subject=Consulta%20sobre%20Farmacias%20de%20Turno%20MDP">Pablo Bella</a></p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
// ==================== CONFIGURACIÓN ====================
const CONFIG = {
  HORA_CAMBIO: 9,
  ZONA_HORARIA: 'America/Argentina/Buenos_Aires',
  TOTAL_CICLOS: 16,
  RUTA_JSON: 'ciclos_final.json'
};

// ==================== VARIABLES GLOBALES ====================
let ciclosData = {};
let mapDesktop = null;
let mapMobile = null;
let activeCard = null;
let markersDesktop = [];
let markersMobile = [];
let farmaciasCoords = [];
const geoCache = {};

// ==================== FECHA INICIO CICLO 1 ====================
const FECHA_INICIO_CICLO_1 = new Date(2026, 3, 22);

// ==================== UTILIDADES ====================
function pad(n) { 
  return String(n).padStart(2, '0'); 
}

function formatearFechaGMT3() {
  const ahora = new Date();
  const opciones = { timeZone: CONFIG.ZONA_HORARIA };
  return new Date(ahora.toLocaleString('en-US', opciones));
}

function labelFecha(d) {
  const dias = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
  const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function capFirst(str) {
  if (!str) return '';
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function limpiarTelefono(tel) {
  if (!tel || tel === 'nan' || tel === 'NaN' || tel === 'null') return '';
  return tel.replace(/\s/g, '');
}

// ==================== CÁLCULO DE CICLO ====================
function obtenerCicloActual() {
  const fechaGMT3 = formatearFechaGMT3();
  const diferenciaMs = fechaGMT3 - FECHA_INICIO_CICLO_1;
  const diasDesdeInicio = Math.floor(diferenciaMs / (1000 * 60 * 60 * 24));
  let ciclo = (diasDesdeInicio % CONFIG.TOTAL_CICLOS) + 1;
  if (ciclo <= 0) ciclo = 1;
  console.log(`📅 Ciclo actual: ${ciclo}`);
  return ciclo;
}

// ==================== ICONO FARMACIA ====================
const pharmacyIcon = L.divIcon({
  className: 'custom-pharmacy-icon',
  html: '<div style="background-color: #3fb950; width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"><span style="color: white; font-weight: bold; font-size: 18px;">⚕️</span></div>',
  iconSize: [26, 26],
  popupAnchor: [0, -13]
});

// ==================== CARGA DE DATOS ====================
async function cargarDatos() {
  const intro = document.getElementById('intro');
  try {
    console.log('🔍 Buscando JSON en:', CONFIG.RUTA_JSON);
    const response = await fetch(CONFIG.RUTA_JSON);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const texto = await response.text();
    try {
      ciclosData = JSON.parse(texto);
    } catch (e) {
      throw new Error('El archivo JSON tiene formato inválido');
    }
    await mostrarFarmacias();
  } catch (error) {
    console.error('❌ Error:', error);
    intro.innerHTML = `<span>⚠️ Error al cargar los datos</span><div class="stats">${error.message}</div>`;
    document.getElementById('lista').innerHTML = '<div class="card">No se pudieron cargar las farmacias</div>';
  }
}

// ==================== GEOCODING ====================
async function geocode(direccion) {
  if (!direccion) return null;
  if (geoCache[direccion]) return geoCache[direccion];
  try {
    const query = `${direccion}, Mar del Plata, Buenos Aires, Argentina`;
    const response = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(query));
    const data = await response.json();
    if (data && data.length > 0) {
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[direccion] = coords;
      return coords;
    }
  } catch (error) {
    console.error('Error geocoding:', error);
  }
  return null;
}

// ==================== INICIALIZAR MAPAS ====================
function initMapDesktop() {
  if (mapDesktop) return;
  mapDesktop = L.map('map-desktop').setView([-38.0055, -57.5426], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(mapDesktop);
}

function initMapMobile() {
  if (mapMobile) return;
  mapMobile = L.map('map-mobile').setView([-38.0055, -57.5426], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(mapMobile);
}

// ==================== LIMPIAR MARCADORES ====================
function limpiarMarcadores() {
  markersDesktop.forEach(marker => mapDesktop.removeLayer(marker));
  markersMobile.forEach(marker => mapMobile.removeLayer(marker));
  markersDesktop = [];
  markersMobile = [];
  farmaciasCoords = [];
}

// ==================== AGREGAR MARCADORES ====================
async function agregarTodosLosMarcadores(farmacias) {
  initMapDesktop();
  initMapMobile();
  limpiarMarcadores();
  
  const desktopBounds = L.latLngBounds();
  const mobileBounds = L.latLngBounds();
  let puntosAgregados = 0;
  
  for (let i = 0; i < farmacias.length; i++) {
    const farmacia = farmacias[i];
    const coords = await geocode(farmacia.direccion);
    farmaciasCoords[i] = coords;
    
    const telefonoLimpio = limpiarTelefono(farmacia.telefono);
    const telefonoLinkPopup = telefonoLimpio ? `<br><a href="tel:${telefonoLimpio}" style="color: var(--accent);">📞 Llamar</a>` : '<br>📞 Sin teléfono';
    const gmapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(farmacia.direccion + ', Mar del Plata')}`;
    
    const popupText = `
      <b>${capFirst(farmacia.nombre)}</b><br>
      ${farmacia.direccion}<br>
      ${telefonoLinkPopup}<br>
      <a href="${gmapsUrl}" target="_blank" rel="noopener noreferrer" class="gmaps-link">🗺️ Abrir en Google Maps</a>
    `;
    
    if (coords) {
      const markerDesktop = L.marker(coords, { icon: pharmacyIcon }).addTo(mapDesktop).bindPopup(popupText);
      const markerMobile = L.marker(coords, { icon: pharmacyIcon }).addTo(mapMobile).bindPopup(popupText);
      markersDesktop.push(markerDesktop);
      markersMobile.push(markerMobile);
      desktopBounds.extend(coords);
      mobileBounds.extend(coords);
      puntosAgregados++;
    } else {
      const fallbackCoords = [-38.0055, -57.5426];
      const markerDesktop = L.marker(fallbackCoords, { icon: pharmacyIcon }).addTo(mapDesktop).bindPopup(popupText + '<br><small>📍 Ubicación aproximada</small>');
      const markerMobile = L.marker(fallbackCoords, { icon: pharmacyIcon }).addTo(mapMobile).bindPopup(popupText + '<br><small>📍 Ubicación aproximada</small>');
      markersDesktop.push(markerDesktop);
      markersMobile.push(markerMobile);
      desktopBounds.extend(fallbackCoords);
      mobileBounds.extend(fallbackCoords);
      puntosAgregados++;
    }
  }
  
  if (puntosAgregados > 0) {
    if (!mapDesktop._initialZoomDone) {
      mapDesktop.fitBounds(desktopBounds);
      mapDesktop._initialZoomDone = true;
    }
    if (!mapMobile._initialZoomDone) {
      mapMobile.fitBounds(mobileBounds);
      mapMobile._initialZoomDone = true;
    }
  }
  console.log(`📍 Agregados ${puntosAgregados} marcadores`);
}

// ==================== CENTRAR MAPA MOBILE ====================
function centrarMapaMobileEnFarmacia(index) {
  const coords = farmaciasCoords[index];
  const view = coords || [-38.0055, -57.5426];
  const zoom = coords ? 16 : 13;
  if (mapMobile) {
    mapMobile.setView(view, zoom);
    if (markersMobile[index]) markersMobile[index].openPopup();
  }
}

// ==================== MOSTRAR FARMACIAS ====================
async function mostrarFarmacias() {
  const ciclo = obtenerCicloActual();
  const farmacias = ciclosData[ciclo] || [];
  const fechaGMT3 = formatearFechaGMT3();
  
  const intro = document.getElementById('intro');
  const lista = document.getElementById('lista');
  
  if (!farmacias.length) {
    intro.innerHTML = `<span>⚠️ No hay datos para hoy</span><div class="stats">📅 ${labelFecha(fechaGMT3)}</div>`;
    lista.innerHTML = '<div class="card">Sin farmacias registradas</div>';
    return;
  }
  
  intro.innerHTML = `<span>💊 Farmacias de turno · <strong>${labelFecha(fechaGMT3)}</strong></span><div class="stats">📊 ${farmacias.length} farmacias de turno</div>`;
  lista.innerHTML = '';
  
  farmacias.forEach((farmacia, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    
    const telefonoLimpio = limpiarTelefono(farmacia.telefono);
    const telefonoLink = telefonoLimpio 
      ? `<a href="tel:${telefonoLimpio}" class="phone-link">📞 ${farmacia.telefono}</a>`
      : '📞 Sin teléfono';
    
    div.innerHTML = `
      <div class="card-num">${pad(index + 1)}</div>
      <div class="card-info">
        <div class="card-name">${capFirst(farmacia.nombre)}</div>
        <div class="card-address">📍 ${farmacia.direccion}</div>
      </div>
      <div class="card-phone">${telefonoLink}</div>
    `;
    
    // Evento para centrar el mapa (solo si no se clickeó el teléfono)
    div.addEventListener('click', (e) => {
      // Si el click NO viene del enlace del teléfono
      if (!e.target.closest('.phone-link')) {
        if (activeCard) activeCard.classList.remove('active');
        div.classList.add('active');
        activeCard = div;
        centrarMapaMobileEnFarmacia(index);
        
        // En desktop, abrir el popup también
        if (mapDesktop && markersDesktop[index]) {
          markersDesktop[index].openPopup();
        }
      }
    });
    
    lista.appendChild(div);
  });
  
  await agregarTodosLosMarcadores(farmacias);
  console.log(`✅ Mostradas ${farmacias.length} farmacias`);
}

// ==================== ACTUALIZACIÓN AUTOMÁTICA ====================
function programarActualizacion() {
  const ahora = formatearFechaGMT3();
  let proxima = new Date(ahora);
  proxima.setHours(CONFIG.HORA_CAMBIO, 0, 0, 0);
  if (ahora >= proxima) proxima.setDate(proxima.getDate() + 1);
  const tiempoMs = proxima - ahora;
  console.log(`⏰ Próxima actualización en ${Math.round(tiempoMs / 60000)} minutos`);
  setTimeout(() => {
    console.log('🔄 Actualizando farmacias...');
    if (mapDesktop) mapDesktop._initialZoomDone = false;
    if (mapMobile) mapMobile._initialZoomDone = false;
    mostrarFarmacias();
    programarActualizacion();
  }, tiempoMs);
}

// ==================== CIERRE DEL MAPA ====================
document.getElementById('closeSheet').addEventListener('click', () => {
  document.getElementById('mapSheet').classList.remove('open');
});

// ==================== INICIALIZACIÓN ====================
async function init() {
  console.log('🚀 Farmacias de Turno - Mar del Plata');
  await cargarDatos();
  programarActualizacion();
}

init();
</script>

</body>
</html>
