<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Farmacias MDP">

  <title>Farmacias de Turno · MDP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    /* === TU CSS SIN CAMBIOS === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22;
      --accent: #3fb950; --accent-dim: rgba(63,185,80,0.12);
      --text: #e6edf3; --muted: #7d8590;
      --border: rgba(255,255,255,0.08); --radius: 14px;
    }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

    header { border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }

    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 18px 24px;
      display: flex; align-items: center; gap: 12px;
    }

    .cross { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
    .cross::before, .cross::after { content: ''; position: absolute; background: var(--accent); border-radius: 3px; }
    .cross::before { width: 12px; height: 32px; left: 10px; top: 0; }
    .cross::after  { width: 32px; height: 12px; left: 0; top: 10px; }

    .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--text); }

    .layout {
      max-width: 1100px; margin: 0 auto;
      padding: 24px 24px 60px;
    }

    @media (min-width: 768px) {
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }
    }

    .col-list { min-width: 0; }

    .intro {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      cursor: pointer;
    }

    .card:hover { border-color: rgba(63,185,80,0.25); }
    .card.active { border-color: rgba(63,185,80,0.5); background: #1a2620; }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--accent);
      opacity: 0.6;
    }

    .card-name { font-weight: 700; }

    .col-map { display: none; }

    @media (min-width: 768px) {
      .col-map {
        display: block;
        position: sticky;
        top: 90px;
      }
    }

    #map-desktop { height: 300px; width: 100%; }

    .map-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      transform: translateY(100%);
      transition: .3s;
    }

    .map-sheet.open { transform: translateY(0); }

    #map-mobile { height: 220px; }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="cross"></div>
    <div class="app-title">Farmacias de Turno</div>
  </div>
</header>

<div class="layout">
  <div class="col-list">
    <p class="intro" id="intro"></p>
    <div id="lista"></div>
  </div>

  <div class="col-map">
    <div id="map-desktop"></div>
  </div>
</div>

<div class="map-sheet" id="mapSheet">
  <div id="sheetName"></div>
  <div id="map-mobile"></div>
</div>

<!-- SOLO UNA VEZ -->
<script>
let TURNOS = {};

fetch('/turnos/ciclos_final.json')
  .then(r => r.json())
  .then(data => {
    TURNOS = data;
    cargar();
  });
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
const geoCache = {};
let mapMobile = null;
let mapDesktop = null;
let activeCard = null;
let currentCoords = null;

/* ===== utils ===== */
function pad(n){ return String(n).padStart(2,'0'); }

function formatFecha(d){
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
}

function labelFecha(d){
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function capFirst(str){
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

/* ===== MAPA ===== */
async function geocode(dir){
  if(geoCache[dir]) return geoCache[dir];

  try{
    const res = await fetch(
      'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' +
      encodeURIComponent(dir + ', Mar del Plata')
    );
    const data = await res.json();

    if(data.length){
      const c = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[dir] = c;
      return c;
    }
  }catch(e){}

  return null;
}

/* ===== UI ===== */
function showFarmacia(f, dir){
  document.getElementById('sheetName').textContent = capFirst(f);

  geocode(dir).then(coords=>{
    if(!mapMobile){
      mapMobile = L.map('map-mobile').setView([-38,-57],13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapMobile);
    }

    if(coords){
      currentCoords = coords;
      mapMobile.setView(coords,16);
      L.marker(coords).addTo(mapMobile);
    }
  });

  document.getElementById('mapSheet').classList.add('open');
}

/* ===== LISTA ===== */
function cargar(){
  const hoy = new Date();
const fecha = String(hoy.getDate());

const farmacias = (TURNOS && TURNOS[fecha]) ? TURNOS[fecha] : [];

  const intro = document.getElementById('intro');
  const lista = document.getElementById('lista');

  if(!farmacias.length){
    intro.innerHTML = 'Sin datos para hoy';
    return;
  }

  intro.innerHTML = `Turnos de hoy: <strong>${labelFecha(hoy)}</strong>`;
  lista.innerHTML = '';

  farmacias.forEach((f,i)=>{
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="card-num">${pad(i+1)}</div>
      <div class="card-name">${capFirst(f.nombre)}</div>
    `;

    div.onclick = ()=>{
      if(activeCard) activeCard.classList.remove('active');
      div.classList.add('active');
      activeCard = div;

      showFarmacia(f.nombre, f.direccion)
    };

    lista.appendChild(div);
  });
}

/* ===== INIT (CLAVE) ===== */
async function init(){
  try{
    const res = await fetch('/turnos/ciclos_final.json')
    TURNOS = await res.json();
    cargar();
  }catch(e){
    console.error("Error cargando JSON", e);
    document.getElementById('intro').innerText = "Error cargando datos";
  }
}

init();
</script>

</body>
</html>
