<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farmacias de Turno · MDP</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      font-family:Nunito,sans-serif;
      background:#0d1117;
      color:#e6edf3;
      display:flex;
      justify-content:center;
    }

    .app{
      width:100%;
      max-width:480px;
      padding:16px;
    }

    header{
      padding:14px 0;
      border-bottom:1px solid rgba(255,255,255,0.08);
      position:sticky;
      top:0;
      background:#0d1117;
    }

    .title{
      font-family:"Bebas Neue",sans-serif;
      font-size:26px;
    }

    .sub{
      font-size:12px;
      color:#7d8590;
    }

    .fecha{
      margin-top:10px;
      text-align:center;
      font-size:13px;
      color:#7d8590;
    }

    button{
      margin-top:10px;
      width:100%;
      padding:10px;
      border:none;
      border-radius:10px;
      background:#161b22;
      color:white;
      cursor:pointer;
    }

    .card{
      background:#161b22;
      border:1px solid rgba(255,255,255,0.08);
      padding:14px;
      border-radius:14px;
      margin-top:10px;
    }

    .name{font-weight:700}
    .muted{font-size:12px;color:#7d8590}
  </style>
</head>

<body>

<div class="app">

  <header>
    <div class="title">Farmacias de Turno</div>
    <div class="sub">Mar del Plata</div>

    <!-- IMPORTANTE: ESTE ID ES CLAVE -->
    <div id="fecha" class="fecha">Cargando...</div>

    <button onclick="hoy()">Actualizar / Hoy</button>
  </header>

  <div id="lista">Cargando...</div>

</div>

<script>

let data = {};
let fechas = [];
let fechaActual = "";

/* FORMATO CONSISTENTE */
function format(d){
  return `${d.getDate()}/${d.getMonth()+1}/${d.getFullYear()}`;
}

/* RENDER SEGURO (NO ROMPE SI FALTA DOM) */
function render(fecha){

  const fechaEl = document.getElementById("fecha");
  if(fechaEl) fechaEl.innerText = fecha;

  const cont = document.getElementById("lista");
  if(!cont) return;

  const lista = data[fecha];

  if(!lista){
    cont.innerHTML = "<div class='card'>Sin datos para esta fecha</div>";
    return;
  }

  cont.innerHTML = "";

  lista.forEach(f => {
    cont.innerHTML += `
      <div class="card">
        <div class="name">${f.farmacia}</div>
        <div class="muted">${f.direccion || ""}</div>
        <div class="muted">${f.telefono || ""}</div>
      </div>
    `;
  });
}

/* ARRANQUE SEGURO */
function hoy(){
  const h = format(new Date());

  if(data[h]){
    fechaActual = h;
  } else {
    fechaActual = fechas[0];
  }

  render(fechaActual);
}

/* CARGA JSON */
fetch("turnos_hasta_31_12.json")
  .then(r => r.json())
  .then(json => {

    data = json;
    fechas = Object.keys(data);

    console.log("FECHAS:", fechas.length);

    hoy();
  })
  .catch(err => {
    document.getElementById("lista").innerHTML =
      "<div class='card'>Error cargando datos</div>";
    console.error(err);
  });

</script>

</body>
</html>
