<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Consultá las farmacias de turno en Mar del Plata. Actualización diaria a las 9 AM.">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
  <title>Farmacias de turno · Mar del Plata</title>
</head>
<body>
  <header>
    <h1>💊 Farmacias de turno</h1>
    <div style="display: flex; align-items: center; gap: 8px;">
      <span id="theme-label" style="font-size: 12px;">tema oscuro</span>
      <button id="theme-switch" aria-label="Cambiar tema"></button>
    </div>
  </header>

  <main>
    <div id="intro"></div>
    <div id="lista"></div>
    <div id="map-desktop"></div>
  </main>

  <div id="mapSheet">
    <div class="sheet-header">
      <span id="sheetName"></span>
      <button id="closeSheet" aria-label="Cerrar">✕</button>
    </div>
    <div id="map-mobile-sheet"></div>
  </div>

  <button id="btnTodasFarmacias" class="btn-todas">Ver todas</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
