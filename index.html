  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='10' y='0' width='12' height='32' fill='%233fb950'/%3E%3Crect x='0' y='10' width='32' height='12' fill='%233fb950'/%3E%3C/svg%3E">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg-dark:#0d1117;--surface-dark:#161b22;--text-dark:#e6edf3;--border-dark:rgba(255,255,255,0.08);--bg-light:#f6f8fa;--surface-light:#ffffff;--text-light:#1f2328;--border-light:rgba(0,0,0,0.1);--accent:#3fb950;--accent-dim:rgba(63,185,80,0.12);--radius:14px}
    body{font-family:'Nunito',sans-serif;min-height:100dvh;display:flex;flex-direction:column;transition:background-color .3s ease,color .3s ease}
    body *{transition:background-color .2s ease,border-color .2s ease,color .2s ease}
    body.dark{--bg:var(--bg-dark);--surface:var(--surface-dark);--text:var(--text-dark);--border:rgba(255,255,255,0.08);background:var(--bg-dark);color:var(--text-dark)}
    body.light{--bg:var(--bg-light);--surface:var(--surface-light);--text:var(--text-light);--border:rgba(0,0,0,0.1);background:var(--bg-light);color:var(--text-light)}
    header{border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);backdrop-filter:blur(10px);z-index:10}
    .header-inner{max-width:1100px;margin:0 auto;padding:18px 24px;display:flex;flex-direction:column;gap:4px}
    .header-top{display:flex;align-items:center;gap:12px}
    .cross{width:32px;height:32px;position:relative;flex-shrink:0}
    .cross::before,.cross::after{content:'';position:absolute;background:var(--accent);border-radius:3px}
    .cross::before{width:12px;height:32px;left:10px;top:0}
    .cross::after{width:32px;height:12px;left:0;top:10px}
    .app-title{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--text);letter-spacing:1px}
    .subtitle{font-size:14px;color:#7d8590;margin-left:44px;letter-spacing:1px}
    .btn-todas,.btn-volver{background:var(--surface);border:1px solid var(--border);border-radius:30px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--accent);transition:all .2s;display:inline-flex;align-items:center;gap:6px;font-weight:500}
    .btn-todas:hover,.btn-volver:hover{background:var(--accent-dim);transform:scale(1.02);border-color:var(--accent)}
    .theme-switch-wrapper{margin-left:12px;text-align:center}
    .theme-switch{width:64px;height:28px;background:var(--surface);border:1px solid var(--border);border-radius:30px;position:relative;cursor:pointer;transition:all .3s;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 6px;box-sizing:border-box}
    .theme-icon{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;pointer-events:none;z-index:1}
    .theme-icon svg{width:14px;height:14px;stroke:var(--accent);color:var(--accent)}
    .theme-slider{width:22px;height:22px;background:var(--accent);border-radius:50%;position:absolute;top:2px;left:3px;transition:transform .3s ease;box-shadow:0 1px 2px rgba(0,0,0,0.2)}
    .theme-switch.active .theme-slider{transform:translateX(34px)}
    .theme-label{font-size:10px;color:#7d8590;margin-top:5px;text-transform:lowercase}
    .layout{max-width:1100px;margin:0 auto;padding:24px 24px 60px;flex:1}
    @media (min-width:768px){.layout{display:grid;grid-template-columns:1fr 1fr;gap:28px}}
    .col-list{min-width:0}
    .intro{font-size:16px;color:var(--text);margin-bottom:20px;padding:16px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
    .intro-line{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .intro strong{color:var(--accent);font-weight:700}
    .stats{font-size:14px;color:#7d8590;display:flex;align-items:center;gap:8px}
    .icon-intro,.icon-stats,.icon-location,.icon-phone,.icon-data,.icon-dev{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;flex-shrink:0}
    .icon-intro svg,.icon-stats svg,.icon-location svg,.icon-phone svg,.icon-data svg,.icon-dev svg{width:18px;height:18px}
    .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;cursor:pointer;transition:all .2s}
    body.light .card:hover{background:#f0f2f5}
    body.dark .card:hover{background:#1a1f2a}
    .card.active{border-color:var(--accent);background:var(--accent-dim)}
    .card-num{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);opacity:0.7;min-width:32px}
    .card-info{flex:1}
    .card-name{font-weight:700;font-size:16px;margin-bottom:6px}
    .card-address{font-size:12px;color:var(--text);opacity:0.85;display:flex;align-items:center;gap:6px;word-break:break-word}
    .card-phone{font-size:12px;text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:6px;white-space:nowrap}
    .phone-link{color:var(--accent);text-decoration:none;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
    .col-map{display:none}
    @media (min-width:768px){.col-map{display:block;position:sticky;top:90px}}
    #map-desktop{height:500px;width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);background:#1a1f2a}
    .map-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform .3s ease;z-index:20}
    .map-sheet.open{transform:translateY(0)}
    .map-sheet-header{padding:16px;font-weight:700;text-align:center;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .map-sheet-close{background:none;border:none;color:#7d8590;font-size:24px;cursor:pointer;padding:0 8px}
    #map-mobile{height:350px;width:100%;background:#1a1f2a}
    .footer{max-width:1100px;margin:0 auto;padding:24px;border-top:1px solid var(--border);text-align:center;font-size:13px;color:#7d8590}
    .footer p{display:flex;align-items:center;justify-content:center;gap:8px;margin:8px 0;flex-wrap:wrap}
    .footer a{color:var(--accent);text-decoration:none}
    .footer a:hover{text-decoration:underline}
    .gmaps-link{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 0;color:var(--accent);text-decoration:none;font-size:12px;font-weight:500;transition:opacity .2s}
    .gmaps-link:hover{opacity:0.8;text-decoration:underline}
    @media (max-width:768px){
      .header-top{flex-wrap:wrap;justify-content:space-between;align-items:center;row-gap:8px}
      .cross{order:1}
      .app-title{order:2;flex:1;font-size:22px}
      .theme-switch-wrapper{order:3}
      .btn-todas,.btn-volver{order:4;margin-left:auto;margin-right:0;margin-top:0}
      .card{flex-wrap:wrap;gap:8px}
      .card-num{min-width:28px;font-size:18px}
      .card-info{flex:1;min-width:0}
      .card-name{font-size:14px;word-break:break-word}
      .card-address{font-size:11px;white-space:normal;word-break:break-word}
      .card-phone{font-size:11px;white-space:nowrap}
      .intro{font-size:14px;padding:12px}
      .stats{font-size:13px}
      .map-sheet-header{padding:12px;font-size:14px}
      #map-mobile{height:280px}
      .footer p{font-size:11px}
    }
  </style>
</head>

      <div class="theme-switch-wrapper">
        <div class="theme-switch" id="theme-switch">
          <span class="theme-icon sun"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M12 1.5V3.5M12 20.5V22.5M1.5 12H3.5M20.5 12H22.5M4.3 4.3L5.7 5.7M18.3 18.3L19.7 19.7M19.7 4.3L18.3 5.7M5.7 18.3L4.3 19.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg></span>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const CONFIG={HORA_CAMBIO:9,ZONA_HORARIA:'America/Argentina/Buenos_Aires',RUTA_JSON:'ciclos_oficiales_definitivo.json'};
let ciclosData={},mapDesktop=null,mapMobile=null,activeCard=null,markersDesktop=[],markersMobile=[],farmaciasCoords=[];
const FECHA_INICIO_CICLO_1 = new Date(2026, 3, 23, 9, 0, 0);
function pad(n){return String(n).padStart(2,'0');}
function formatearFechaGMT3(){const a=new Date(),o={timeZone:CONFIG.ZONA_HORARIA};return new Date(a.toLocaleString('en-US',o));}
function labelFecha(d){const di=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'],me=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];return `${di[d.getDay()]} ${d.getDate()} de ${me[d.getMonth()]} de ${d.getFullYear()}`;}
function capFirst(s){return s?s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()):'';}
function limpiarTelefono(t){return(!t||t==='nan'||t==='NaN'||t==='null')?'':t.replace(/\s/g,'');}
function obtenerCicloActual(){const f=formatearFechaGMT3(),d=Math.floor((f-FECHA_INICIO_CICLO_1)/864e5);let c=(d%16)+1;if(c<=0)c=1;return c;}
const pharmacyIcon=L.divIcon({className:'custom-pharmacy-icon',html:'<svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#3fb950" stroke="white" stroke-width="1.5"/><path d="M12 7L12 13M9 10L15 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>',iconSize:[34,34],popupAnchor:[0,-17]});
async function cargarDatos(){const i=document.getElementById('intro');try{console.log('Cargando JSON...');const r=await fetch(CONFIG.RUTA_JSON);if(!r.ok)throw new Error('HTTP '+r.status);ciclosData=await r.json();mostrarFarmacias();}catch(e){console.error(e);i.innerHTML='⚠️ Error al cargar datos';document.getElementById('lista').innerHTML='<div class="card">No se pudieron cargar las farmacias</div>';}}
function initMaps(){if(!mapDesktop)mapDesktop=L.map('map-desktop').setView([-38.0055,-57.5426],12),L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapDesktop);if(!mapMobile)mapMobile=L.map('map-mobile').setView([-38.0055,-57.5426],12),L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapMobile);}
function limpiarMarcadores(){markersDesktop.forEach(m=>mapDesktop.removeLayer(m));markersMobile.forEach(m=>mapMobile.removeLayer(m));markersDesktop=[];markersMobile=[];farmaciasCoords=[];}
function agregarMarcadores(farmacias){initMaps();limpiarMarcadores();const dBounds=L.latLngBounds(),mBounds=L.latLngBounds();farmacias.forEach((f,i)=>{const c=f.lat&&f.lng?[f.lat,f.lng]:null;farmaciasCoords[i]=c;const tClean=limpiarTelefono(f.telefono);const tIcon=`<span class="icon-phone"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="var(--accent)"/></svg></span>`;const tLink=tClean?`<br><a href="tel:${tClean}" style="color:var(--accent);display:inline-flex;align-items:center;gap:6px;margin-top:4px;">${tIcon} ${f.telefono}</a>`:'<br>📞 Sin teléfono';const gUrl=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(f.direccion+', Mar del Plata')}`;const pop=`<b>${capFirst(f.nombre)}</b><br>${f.direccion}<br>${tLink}<br><a href="${gUrl}" target="_blank" class="gmaps-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="var(--accent)"/><circle cx="12" cy="9" r="3" fill="var(--bg)"/></svg>Google Maps</a>`;if(c){const mD=L.marker(c,{icon:pharmacyIcon}).addTo(mapDesktop).bindPopup(pop);const mM=L.marker(c,{icon:pharmacyIcon}).addTo(mapMobile).bindPopup(pop);markersDesktop.push(mD);markersMobile.push(mM);dBounds.extend(c);mBounds.extend(c);}else{const fb=[-38.0055,-57.5426];const mD=L.marker(fb,{icon:pharmacyIcon}).addTo(mapDesktop).bindPopup(pop+'<br><small>📍 Ubicación aproximada</small>');const mM=L.marker(fb,{icon:pharmacyIcon}).addTo(mapMobile).bindPopup(pop+'<br><small>📍 Ubicación aproximada</small>');markersDesktop.push(mD);markersMobile.push(mM);dBounds.extend(fb);mBounds.extend(fb);}});if(farmacias.length>0){if(!mapDesktop._initialZoom){mapDesktop.fitBounds(dBounds);mapDesktop._initialZoom=true;}if(!mapMobile._initialZoom){mapMobile.fitBounds(mBounds);mapMobile._initialZoom=true;}}console.log(`📍 Marcadores agregados:`,farmacias.length);}
function getLocationIcon(){return `<span class="icon-location"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="var(--accent)"/><circle cx="12" cy="9" r="3" fill="white"/></svg></span>`;}
function getPhoneIcon(){return `<span class="icon-phone"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="var(--accent)"/></svg></span>`;}
function mostrarFarmacias() {
    const cicloInterno = obtenerCicloActual();
    
    // Mapeo: ciclo_interno -> grupo_oficial
    const mapaGruposOficiales = { 8: 1 };
    const grupoOficial = mapaGruposOficiales[cicloInterno] || cicloInterno;
    
    // OBTENEMOS LAS FARMACIAS DEL CICLO INTERNO (no del oficial)
    const farmacias = ciclosData[cicloInterno] || [];
    const fecha = formatearFechaGMT3();
    const intro = document.getElementById('intro');
    const lista = document.getElementById('lista');
    
    if (!farmacias.length) {
        intro.innerHTML = `<span>⚠️ No hay datos para hoy</span><div class="stats">📅 ${labelFecha(fecha)}</div>`;
        lista.innerHTML = '<div class="card">Sin farmacias registradas</div>';
        return;
    }
    
    const fechaFin = new Date(fecha);
    fechaFin.setDate(fechaFin.getDate() + 1);
    intro.innerHTML = `<div class="intro-line"><span class="icon-intro"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 8V12L15 15M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="var(--accent)" stroke-width="1.5" fill="none"/></svg></span><span>Turno vigente · <strong>Grupo ${grupoOficial}</strong></span><span style="font-size:12px;color:#7d8590;">(hasta las 9 del ${labelFecha(fechaFin)})</span></div><div class="stats"><span class="icon-stats"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12L10 17L20 7" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></span><span>${farmacias.length} farmacias de turno</span></div>`;
    
    lista.innerHTML = '';
    farmacias.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        const tClean = limpiarTelefono(f.telefono);
        const tLink = tClean ? `<a href="tel:${tClean}" class="phone-link" onclick="event.stopPropagation();">${getPhoneIcon()} ${f.telefono}</a>` : `<span class="phone-link">${getPhoneIcon()} Sin teléfono</span>`;
        div.innerHTML = `<div class="card-num">${pad(i+1)}</div><div class="card-info"><div class="card-name">${capFirst(f.nombre)}</div><div class="card-address">${getLocationIcon()} ${f.direccion}</div></div><div class="card-phone">${tLink}</div>`;
        div.onclick = e => {
            if (e.target.closest('.phone-link')) return;
            const sheet = document.getElementById('mapSheet');
            document.getElementById('sheetName').innerHTML = `${capFirst(f.nombre)}<br><small style="font-size:12px">${f.direccion}</small>`;
            sheet.classList.add('open');
            const c = farmaciasCoords[i];
            if (c) mapMobile.setView(c, 16);
            if (c && markersMobile[i]) markersMobile[i].openPopup();
            if (activeCard) activeCard.classList.remove('active');
            div.classList.add('active');
            activeCard = div;
            if (mapDesktop && markersDesktop[i]) markersDesktop[i].openPopup();
        };
        lista.appendChild(div);
    });
    agregarMarcadores(farmacias);
}function programarActualizacion(){const a=formatearFechaGMT3();let p=new Date(a);p.setHours(9,0,0,0);if(a>=p)p.setDate(p.getDate()+1);setTimeout(()=>{mostrarFarmacias();programarActualizacion();},p-a);}
document.getElementById('closeSheet').onclick=()=>document.getElementById('mapSheet').classList.remove('open');
let modoTodas=false,farmaciasOriginales=null;
function mostrarTodasLasFarmacias(){if(modoTodas)return;modoTodas=true;farmaciasOriginales={lista:document.getElementById('lista').innerHTML,intro:document.getElementById('intro').innerHTML};const farmaciasUnicas=new Map();for(const grupo in ciclosData){for(const f of ciclosData[grupo]){const key=`${f.nombre}|${f.direccion}`;if(!farmaciasUnicas.has(key))farmaciasUnicas.set(key,f);}}const todas=Array.from(farmaciasUnicas.values());document.getElementById('intro').innerHTML=`<div class="intro-line"><span class="icon-intro">📍</span><span>Todas las farmacias de Mar del Plata</span></div><div class="stats"><span>🏪 ${todas.length} farmacias únicas</span></div>`;const lista=document.getElementById('lista');lista.innerHTML='';todas.forEach((f,i)=>{const div=document.createElement('div');div.className='card';div.innerHTML=`<div class="card-num">${i+1}</div><div class="card-info"><div class="card-name">${capFirst(f.nombre)}</div><div class="card-address">📍 ${f.direccion}</div></div>`;div.onclick=()=>{if(f.lat&&f.lng){mapDesktop.setView([f.lat,f.lng],16);mapMobile.setView([f.lat,f.lng],16);}};lista.appendChild(div);});limpiarMarcadores();agregarMarcadores(todas);const btn=document.getElementById('btnTodasFarmacias');btn.textContent='↺ Volver';btn.classList.remove('btn-todas');btn.classList.add('btn-volver');}
function volverATurno(){if(!modoTodas)return;modoTodas=false;document.getElementById('lista').innerHTML=farmaciasOriginales.lista;document.getElementById('intro').innerHTML=farmaciasOriginales.intro;mostrarFarmacias();const btn=document.getElementById('btnTodasFarmacias');btn.textContent='📍 Ver todas';btn.classList.remove('btn-volver');btn.classList.add('btn-todas');}
document.getElementById('btnTodasFarmacias').addEventListener('click',()=>{if(modoTodas)volverATurno();else mostrarTodasLasFarmacias();});
function initTheme(){const s=localStorage.getItem('theme'),p=window.matchMedia('(prefers-color-scheme: dark)').matches,sw=document.getElementById('theme-switch'),l=document.getElementById('theme-label');let d=s==='dark'||(!s&&p);if(d){document.body.classList.add('dark');document.body.classList.remove('light');sw.classList.remove('active');l.textContent='tema oscuro';}else{document.body.classList.add('light');document.body.classList.remove('dark');sw.classList.add('active');l.textContent='tema claro';}}
document.getElementById('theme-switch').onclick=()=>{const sw=document.getElementById('theme-switch'),l=document.getElementById('theme-label');if(document.body.classList.contains('dark')){document.body.classList.remove('dark');document.body.classList.add('light');localStorage.setItem('theme','light');sw.classList.add('active');l.textContent='tema claro';}else{document.body.classList.remove('light');document.body.classList.add('dark');localStorage.setItem('theme','dark');sw.classList.remove('active');l.textContent='tema oscuro';}};
(async()=>{console.log('🚀 Iniciando app optimizada');initTheme();await cargarDatos();programarActualizacion();})();
</script>
