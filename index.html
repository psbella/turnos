<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Farmacias MDP">
  <title>Farmacias de Turno · MDP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --surface: #161b22;
      --accent: #3fb950; --accent-dim: rgba(63,185,80,0.12);
      --text: #e6edf3; --muted: #7d8590;
      --border: rgba(255,255,255,0.08); --radius: 14px;
    }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 18px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    .cross { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
    .cross::before, .cross::after { content: ''; position: absolute; background: var(--accent); border-radius: 3px; }
    .cross::before { width: 12px; height: 32px; left: 10px; top: 0; }
    .cross::after  { width: 32px; height: 12px; left: 0; top: 10px; }
    .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 1px; color: var(--text); line-height: 1; }
    .app-sub { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; margin-top: 2px; }

    /* ── LAYOUT ── */
    .layout {
      max-width: 1100px; margin: 0 auto;
      padding: 24px 24px 60px;
    }

    @media (min-width: 768px) {
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
        align-items: start;
      }
    }

    /* ── LEFT COLUMN ── */
    .col-list { min-width: 0; }
    .intro { font-size: 15px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
    .intro strong { color: var(--text); font-weight: 700; }

    .card {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 14px 16px;
      margin-bottom: 10px; display: flex; gap: 12px;
      align-items: flex-start; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .card:hover { border-color: rgba(63,185,80,0.25); }
    .card.active { border-color: rgba(63,185,80,0.5); background: #1a2620; }
    .card-num { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--accent); opacity: 0.5; line-height: 1; min-width: 24px; margin-top: 2px; }
    .card-body { flex: 1; min-width: 0; }
    .card-name { font-weight: 700; font-size: 15px; color: var(--text); margin-bottom: 6px; text-transform: capitalize; }
    .card-detail { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .card-detail:last-child { margin-bottom: 0; }
    .icon { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.6; }
    .phone-link { color: var(--accent); text-decoration: none; font-weight: 600; }
    .phone-link:hover { text-decoration: underline; }
    .maps-link { color: var(--accent); text-decoration: none; font-weight: 600; }
    .maps-link:hover { text-decoration: underline; }
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 14px; }

    /* ── RIGHT COLUMN (desktop) ── */
    .col-map {
      display: none;
    }
    @media (min-width: 768px) {
      .col-map {
        display: block;
        position: sticky;
        top: 90px;
      }
    }
    .desktop-map-panel {
      background: var(--surface); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
    }
    .desktop-map-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .desktop-map-name { font-weight: 700; font-size: 15px; color: var(--text); text-transform: capitalize; }
    .desktop-map-addr { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }
    .desktop-map-placeholder {
      height: 300px; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 14px;
    }
    .desktop-map-placeholder svg { opacity: 0.3; }
    #map-desktop { height: 300px; width: 100%; }
    .desktop-map-actions {
      padding: 10px 16px 14px; display: flex; gap: 8px;
    }
    .map-btn {
      flex: 1; padding: 10px; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.15s;
    }
    .map-btn:hover { opacity: 0.85; }
    .map-btn-maps { background: var(--accent); color: #0d1117; }
    .map-btn-waze { background: #1a1a2e; color: #00d2ff; border: 1px solid rgba(0,210,255,0.3); }

    /* ── MOBILE BOTTOM SHEET ── */
    .map-sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface); border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 100;
    }
    .map-sheet.open { transform: translateY(0); }
    @media (min-width: 768px) {
      .map-sheet { display: none !important; }
    }
    .map-sheet-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
    }
    .map-sheet-name { font-weight: 700; font-size: 15px; color: var(--text); text-transform: capitalize; }
    .map-sheet-addr { font-size: 12px; color: var(--muted); margin-top: 2px; text-transform: capitalize; }
    .map-close {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.08); border: none; cursor: pointer;
      color: var(--muted); font-size: 16px; display: flex; align-items: center; justify-content: center;
    }
    .map-close:hover { background: rgba(255,255,255,0.15); }
    #map-mobile { height: 220px; width: 100%; }
    .map-sheet-actions {
      padding: 10px 16px 16px; display: flex; gap: 8px;
    }
    .map-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 99; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .map-overlay.open { opacity: 1; pointer-events: all; }
    @media (min-width: 768px) {
      .map-overlay { display: none !important; }
    }

    .geo-loading {
      height: 220px; display: flex; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 13px;
    }
    .geo-loading-desktop {
      height: 300px; display: flex; align-items: center; justify-content: center;
      gap: 10px; color: var(--muted); font-size: 13px;
    }
    .mini-spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 20px 24px;
      max-width: 1100px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: space-between; align-items: center;
      font-size: 12px; color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .leaflet-container { background: #1a2030; }
  </style>
</head>

const geoCache = {};
let mapMobile = null;
let mapDesktop = null;
let activeCard = null;
let currentCoords = null;
let currentDireccion = null;
let currentFarmacia = null;

function pad(n){ return String(n).padStart(2,'0'); }
function formatFecha(d){ return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear(); }
function labelFecha(d){
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()]+' '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
}
function capFirst(str){ return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); }
function mapsUrl(dir){ return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(dir+', Mar del Plata, Argentina'); }
function wazeUrl(lat,lng){ return 'https://waze.com/ul?ll='+lat+','+lng+'&navigate=yes'; }

async function geocode(dir){
  if(geoCache[dir]) return geoCache[dir];
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+encodeURIComponent(dir+', Mar del Plata, Buenos Aires, Argentina');
  try{
    const res = await fetch(url, {headers:{'Accept-Language':'es'}});
    const data = await res.json();
    if(data.length>0){
      const c=[parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[dir]=c; return c;
    }
  }catch(e){}
  return null;
}

const markerIcon = L.divIcon({
  html:'<div style="background:#3fb950;width:14px;height:14px;border-radius:50%;border:3px solid #0d1117;box-shadow:0 0 0 2px #3fb950;"></div>',
  iconSize:[14,14], iconAnchor:[7,7], className:''
});

function placeMarker(mapObj, lat, lng){
  mapObj.setView([lat,lng],16);
  mapObj.eachLayer(l=>{ if(l instanceof L.Marker) mapObj.removeLayer(l); });
  L.marker([lat,lng],{icon:markerIcon}).addTo(mapObj);
  setTimeout(()=>mapObj.invalidateSize(),50);
}

function isDesktop(){ return window.innerWidth >= 768; }

function showFarmacia(farmacia, direccion){
  currentFarmacia = farmacia;
  currentDireccion = direccion;

  if(isDesktop()){
    showDesktop(farmacia, direccion);
  } else {
    showMobile(farmacia, direccion);
  }
}

function showDesktop(farmacia, direccion){
  document.getElementById('desktopMapHeader').style.display = 'block';
  document.getElementById('desktopMapName').textContent = capFirst(farmacia);
  document.getElementById('desktopMapAddr').textContent = capFirst(direccion);
  document.getElementById('desktopPlaceholder').style.display = 'none';
  document.getElementById('desktopMapActions').style.display = 'flex';

  const container = document.getElementById('map-desktop');
  container.style.display = 'block';
  container.innerHTML = '';

  // Re-init map to avoid stale state
  if(mapDesktop){ mapDesktop.remove(); mapDesktop=null; }
  mapDesktop = L.map('map-desktop',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapDesktop);
  L.control.attribution({position:'bottomright',prefix:'© OSM'}).addTo(mapDesktop);

  document.getElementById('desktopBtnMaps').onclick = ()=> window.open(mapsUrl(direccion),'_blank');
  document.getElementById('desktopBtnWaze').onclick = ()=>{ if(currentCoords) window.open(wazeUrl(currentCoords[0],currentCoords[1]),'_blank'); };

  geocode(direccion).then(coords=>{
    if(coords){
      currentCoords = coords;
      placeMarker(mapDesktop, coords[0], coords[1]);
      document.getElementById('desktopBtnWaze').style.display='';
    } else {
      currentCoords = null;
      container.innerHTML='<div class="geo-loading-desktop"><span style="color:var(--muted)">No se pudo geolocalizar</span></div>';
      document.getElementById('desktopBtnWaze').style.display='none';
    }
  });
}

function showMobile(farmacia, direccion){
  document.getElementById('sheetName').textContent = capFirst(farmacia);
  document.getElementById('sheetAddr').textContent = capFirst(direccion);

  const mobileMap = document.getElementById('map-mobile');
  mobileMap.innerHTML = '<div class="geo-loading"><div class="mini-spinner"></div><span>Buscando en el mapa...</span></div>';

  document.getElementById('mapSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');

  document.getElementById('mobileBtnMaps').onclick = ()=> window.open(mapsUrl(direccion),'_blank');
  document.getElementById('mobileBtnWaze').onclick = ()=>{ if(currentCoords) window.open(wazeUrl(currentCoords[0],currentCoords[1]),'_blank'); };

  geocode(direccion).then(coords=>{
    mobileMap.innerHTML = '';
    if(mapMobile){ mapMobile.remove(); mapMobile=null; }
    mapMobile = L.map('map-mobile',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapMobile);
    L.control.attribution({position:'bottomright',prefix:'© OSM'}).addTo(mapMobile);

    if(coords){
      currentCoords = coords;
      placeMarker(mapMobile, coords[0], coords[1]);
      document.getElementById('mobileBtnWaze').style.display='';
    } else {
      currentCoords = null;
      mapMobile.setView([-38.0, -57.55], 13);
      document.getElementById('mobileBtnWaze').style.display='none';
    }
  });
}

function closeMobile(){
  document.getElementById('mapSheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
  if(activeCard){ activeCard.classList.remove('active'); activeCard=null; }
}

document.getElementById('mapClose').addEventListener('click', closeMobile);
document.getElementById('overlay').addEventListener('click', closeMobile);

function cargar(){
  const hoy = new Date();
  const fecha = formatFecha(hoy);
  const farmacias = TURNOS[fecha];
  const intro = document.getElementById('intro');
  const lista = document.getElementById('lista');

  if(!farmacias || farmacias.length === 0){
    intro.innerHTML = 'Hoy <strong>'+labelFecha(hoy)+'</strong> no hay datos disponibles.';
    intro.style.display = 'block';
    lista.innerHTML = '<div class="empty">Sin información para esta fecha.</div>';
    return;
  }

  intro.innerHTML = 'Hoy <strong>'+labelFecha(hoy)+'</strong> están de turno desde las 9:00 hs. por 24 horas las siguientes farmacias:';
  intro.style.display = 'block';

  lista.innerHTML = '';
  farmacias.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    const phoneHtml = f.telefono
      ? '<a class="phone-link" href="tel:'+f.telefono.replace(/\D/g,'')+'" onclick="event.stopPropagation()">'+f.telefono+'</a>'
      : '<span style="color:var(--muted);font-style:italic;">sin teléfono</span>';
    div.innerHTML = `
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-body">
        <div class="card-name">${capFirst(f.farmacia)}</div>
        <div class="card-detail">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          <a class="maps-link" href="${mapsUrl(f.direccion)}" target="_blank" onclick="event.stopPropagation()">${capFirst(f.direccion)}</a>
        </div>
        <div class="card-detail">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.22 1.18 2 2 0 012.2 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.72 6.72l1.48-.59a2 2 0 012.11.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          ${phoneHtml}
        </div>
      </div>
    `;
    div.addEventListener('click', ()=>{
      if(activeCard && activeCard!==div) activeCard.classList.remove('active');
      div.classList.add('active');
      activeCard = div;
      showFarmacia(f.farmacia, f.direccion);
    });
    lista.appendChild(div);
  });
}

cargar();
</script>
