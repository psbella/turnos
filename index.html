  <meta name="apple-mobile-web-app-title" content="Farmacias MDP">
  <title id="page-title">Farmacias de turno en Mar del Plata · Cargando...</title>
  <meta name="description" content="Farmacias de turno HOY en Mar del Plata. Lista actualizada con dirección, teléfono y mapa interactivo.">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/png" sizes="96x96" href="/icon-96.png">
  <link rel="icon" type="image/png" sizes="48x48" href="/icon-48.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png">

  <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
  <header>
    <div class="header-inner">
      <div class="header-top">
        <div class="cross"></div>
        <div class="app-title">Farmacias de Turno</div>
        <div class="theme-switch-wrapper">
          <div class="theme-switch" id="theme-switch">
            <span class="theme-icon sun"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="4.5"/><path d="M12 1.5V3.5M12 20.5V22.5M1.5 12H3.5M20.5 12H22.5M4.3 4.3L5.7 5.7M18.3 18.3L19.7 19.7M19.7 4.3L18.3 5.7M5.7 18.3L4.3 19.7"/></svg></span>
            <div class="theme-slider"></div>
            <span class="theme-icon moon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M20.5 13.5A8.5 8.5 0 0 1 10.5 3.5a9 9 0 1 0 10 10z"/></svg></span>
          </div>
          <div class="theme-label" id="theme-label">tema oscuro</div>
        </div>
      </div>
      <div class="subtitle">CIUDAD DE MAR DEL PLATA</div>
    </div>
  </header>

  <main>
    <div class="col-list">
      <div class="intro" id="intro"><span>Cargando datos...</span></div>
      <div id="lista"></div>
    </div>
    <div class="col-map">
      <div id="map-desktop"></div>
    </div>
  </main>

  <div class="map-sheet" id="mapSheet">
    <div class="map-sheet-header">
      <span id="sheetName"></span>
      <button class="map-sheet-close" id="closeSheet">✕</button>
    </div>
    <div id="map-mobile-sheet"></div>
  </div>

  <!-- BOTONES FLOTANTES MODERNOS (sin duplicados) -->
  <button id="btnTodasFarmacias" class="btn-todas">Ver todas</button>
  <!-- El botón de ir arriba se crea con JavaScript (no va en HTML) -->

  <footer class="footer">
    <p>Datos: <a href="http://colfarmamdp.com.ar/" target="_blank">Colegio de Farmacéuticos de Gral. Pueyrredon</a></p>

  </footer>
