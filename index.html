<!-- scripts -->
<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
const geoCache = {};
let mapMobile = null;
let mapDesktop = null;
let activeCard = null;
let currentCoords = null;
let currentDireccion = null;
let currentFarmacia = null;

function pad(n){ return String(n).padStart(2,'0'); }

function formatFecha(d){
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
}

function labelFecha(d){
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()]+' '+d.getDate()+' de '+meses[d.getMonth()]+' de '+d.getFullYear();
}

function capFirst(str){
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function mapsUrl(dir){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(dir+', Mar del Plata, Argentina');
}

function wazeUrl(lat,lng){
  return 'https://waze.com/ul?ll='+lat+','+lng+'&navigate=yes';
}

async function geocode(dir){
  if(geoCache[dir]) return geoCache[dir];

  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+
    encodeURIComponent(dir+', Mar del Plata, Buenos Aires, Argentina');

  try{
    const res = await fetch(url, {headers:{'Accept-Language':'es'}});
    const data = await res.json();

    if(data.length>0){
      const c=[parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[dir]=c;
      return c;
    }
  }catch(e){}

  return null;
}

const markerIcon = L.divIcon({
  html:'<div style="background:#3fb950;width:14px;height:14px;border-radius:50%;border:3px solid #0d1117;box-shadow:0 0 0 2px #3fb950;"></div>',
  iconSize:[14,14],
  iconAnchor:[7,7],
  className:''
});

function placeMarker(mapObj, lat, lng){
  mapObj.setView([lat,lng],16);

  mapObj.eachLayer(l=>{
    if(l instanceof L.Marker) mapObj.removeLayer(l);
  });

  L.marker([lat,lng],{icon:markerIcon}).addTo(mapObj);
  setTimeout(()=>mapObj.invalidateSize(),50);
}

function isDesktop(){
  return window.innerWidth >= 768;
}

function showFarmacia(farmacia, direccion){
  currentFarmacia = farmacia;
  currentDireccion = direccion;

  if(isDesktop()){
    showDesktop(farmacia, direccion);
  } else {
    showMobile(farmacia, direccion);
  }
}

function showDesktop(farmacia, direccion){
  document.getElementById('desktopMapHeader').style.display = 'block';
  document.getElementById('desktopMapName').textContent = capFirst(farmacia);
  document.getElementById('desktopMapAddr').textContent = capFirst(direccion);
  document.getElementById('desktopPlaceholder').style.display = 'none';
  document.getElementById('desktopMapActions').style.display = 'flex';

  const container = document.getElementById('map-desktop');
  container.style.display = 'block';
  container.innerHTML = '';

  if(mapDesktop){
    mapDesktop.remove();
    mapDesktop=null;
  }

  mapDesktop = L.map('map-desktop',{zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapDesktop);

  document.getElementById('desktopBtnMaps').onclick =
    ()=> window.open(mapsUrl(direccion),'_blank');

  document.getElementById('desktopBtnWaze').onclick =
    ()=>{ if(currentCoords) window.open(wazeUrl(currentCoords[0],currentCoords[1]),'_blank'); };

  geocode(direccion).then(coords=>{
    if(coords){
      currentCoords = coords;
      placeMarker(mapDesktop, coords[0], coords[1]);
    }
  });
}

function showMobile(farmacia, direccion){
  document.getElementById('sheetName').textContent = capFirst(farmacia);
  document.getElementById('sheetAddr').textContent = capFirst(direccion);

  document.getElementById('mapSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');

  geocode(direccion).then(coords=>{
    if(mapMobile){
      mapMobile.remove();
      mapMobile=null;
    }

    mapMobile = L.map('map-mobile',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(mapMobile);

    if(coords){
      currentCoords = coords;
      placeMarker(mapMobile, coords[0], coords[1]);
    }
  });
}

function closeMobile(){
  document.getElementById('mapSheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');

  if(activeCard){
    activeCard.classList.remove('active');
    activeCard = null;
  }
}

document.getElementById('mapClose').addEventListener('click', closeMobile);
document.getElementById('overlay').addEventListener('click', closeMobile);

// ✅ FUNCIÓN LIMPIA
function cargar(){
  const hoy = new Date();
  const fecha = formatFecha(hoy);
  const farmacias = TURNOS[fecha] || [];

  const intro = document.getElementById('intro');
  const lista = document.getElementById('lista');

  if(!farmacias.length){
    intro.innerHTML = 'Hoy <strong>'+labelFecha(hoy)+'</strong> no hay datos disponibles.';
    lista.innerHTML = '<div class="empty">Sin información.</div>';
    return;
  }

  intro.innerHTML = 'Hoy <strong>'+labelFecha(hoy)+'</strong> están de turno:';
  lista.innerHTML = '';

  farmacias.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'card';

    div.innerHTML = `
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-body">
        <div class="card-name">${capFirst(f.farmacia)}</div>
        <div class="card-detail">${capFirst(f.direccion)}</div>
      </div>
    `;

    div.onclick = ()=>{
      if(activeCard) activeCard.classList.remove('active');
      div.classList.add('active');
      activeCard = div;

      showFarmacia(f.farmacia, f.direccion);
    };

    lista.appendChild(div);
  });
}

// INIT
cargar();
</script>
</body>
</html>
