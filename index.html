<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>Farmacias de Turno · MDP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <!-- TU CSS ORIGINAL (no tocado) -->
  <style>
    /* (todo tu CSS igual, sin cambios) */
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="cross"></div>
    <div>
      <div class="app-title">Farmacias de Turno</div>
      <div class="app-sub">MAR DEL PLATA</div>
    </div>
  </div>
</header>

<div class="layout">

  <div class="col-list">
    <p class="intro" id="intro"></p>
    <div id="lista"></div>
  </div>

  <div class="col-map">
    <div class="desktop-map-panel">
      <div class="desktop-map-header" id="desktopMapHeader" style="display:none;">
        <div class="desktop-map-name" id="desktopMapName"></div>
        <div class="desktop-map-addr" id="desktopMapAddr"></div>
      </div>

      <div class="desktop-map-placeholder" id="desktopPlaceholder">
        <span>Tocá una farmacia para ver el mapa</span>
      </div>

      <div id="map-desktop" style="display:none; height:300px;"></div>

      <div class="desktop-map-actions" id="desktopMapActions" style="display:none;">
        <button class="map-btn map-btn-maps" id="desktopBtnMaps">Maps</button>
        <button class="map-btn map-btn-waze" id="desktopBtnWaze">Waze</button>
      </div>
    </div>
  </div>

</div>

<footer>
  <span>MDP</span>
</footer>

<div class="map-overlay" id="overlay"></div>

<div class="map-sheet" id="mapSheet">
  <div class="map-sheet-header">
    <div>
      <div class="map-sheet-name" id="sheetName"></div>
      <div class="map-sheet-addr" id="sheetAddr"></div>
    </div>
    <button class="map-close" id="mapClose">✕</button>
  </div>

  <div id="map-mobile" style="height:220px;"></div>

  <div class="map-sheet-actions">
    <button id="mobileBtnMaps">Maps</button>
    <button id="mobileBtnWaze">Waze</button>
  </div>
</div>

<!-- scripts (SIN DUPLICAR) -->
<script src="data.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
const geoCache = {};
let mapMobile = null;
let mapDesktop = null;
let activeCard = null;
let currentCoords = null;

function pad(n){ return String(n).padStart(2,'0'); }

function formatFecha(d){
  return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear();
}

function labelFecha(d){
  const dias=['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()]+' '+d.getDate()+' de '+meses[d.getMonth()];
}

function capFirst(s){
  return s ? s.toLowerCase().replace(/\b\w/g,c=>c.toUpperCase()) : '';
}

function mapsUrl(dir){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(dir+', Mar del Plata');
}

function wazeUrl(lat,lng){
  return 'https://waze.com/ul?ll='+lat+','+lng+'&navigate=yes';
}

async function geocode(dir){
  if(geoCache[dir]) return geoCache[dir];

  try{
    const r = await fetch(
      'https://nominatim.openstreetmap.org/search?format=json&limit=1&q='+
      encodeURIComponent(dir+', Mar del Plata, Argentina')
    );
    const d = await r.json();
    if(d.length){
      const c=[+d[0].lat,+d[0].lon];
      geoCache[dir]=c;
      return c;
    }
  }catch(e){}
  return null;
}

function placeMarker(map, lat, lng){
  map.setView([lat,lng],16);
  map.eachLayer(l=>{
    if(l instanceof L.Marker) map.removeLayer(l);
  });
  L.marker([lat,lng]).addTo(map);
}

function showFarmacia(f,d){
  if(window.innerWidth>=768) showDesktop(f,d);
  else showMobile(f,d);
}

function showDesktop(f,d){
  document.getElementById('desktopMapHeader').style.display='block';
  document.getElementById('map-desktop').style.display='block';
  document.getElementById('desktopPlaceholder').style.display='none';
  document.getElementById('desktopMapActions').style.display='flex';

  document.getElementById('desktopMapName').textContent=capFirst(f);
  document.getElementById('desktopMapAddr').textContent=capFirst(d);

  if(mapDesktop) mapDesktop.remove();

  mapDesktop = L.map('map-desktop');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapDesktop);

  geocode(d).then(c=>{
    if(c){
      currentCoords=c;
      placeMarker(mapDesktop,c[0],c[1]);
    }
  });
}

function showMobile(f,d){
  document.getElementById('mapSheet').classList.add('open');
  document.getElementById('overlay').classList.add('open');

  document.getElementById('sheetName').textContent=capFirst(f);
  document.getElementById('sheetAddr').textContent=capFirst(d);

  if(mapMobile) mapMobile.remove();

  mapMobile = L.map('map-mobile');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapMobile);

  geocode(d).then(c=>{
    if(c){
      currentCoords=c;
      placeMarker(mapMobile,c[0],c[1]);
    }
  });
}

function closeMobile(){
  document.getElementById('mapSheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('mapClose').addEventListener('click',closeMobile);
document.getElementById('overlay').addEventListener('click',closeMobile);

function cargar(){
  const hoy=new Date();
  const fecha=formatFecha(hoy);
  const farmacias=TURNOS[fecha]||[];

  const lista=document.getElementById('lista');
  const intro=document.getElementById('intro');

  lista.innerHTML='';

  if(!farmacias.length){
    intro.innerHTML='Sin datos';
    return;
  }

  intro.innerHTML='Turnos '+labelFecha(hoy);

  farmacias.forEach((f,i)=>{
    const div=document.createElement('div');
    div.className='card';

    div.innerHTML=`
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-body">
        <div class="card-name">${capFirst(f.farmacia)}</div>
        <div class="card-detail">${capFirst(f.direccion)}</div>
      </div>
    `;

    div.onclick=()=>{
      if(activeCard) activeCard.classList.remove('active');
      activeCard=div;
      div.classList.add('active');
      showFarmacia(f.farmacia,f.direccion);
    };

    lista.appendChild(div);
  });
}

cargar();
</script>

</body>
</html>
