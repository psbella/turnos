<script>
let data = {};
let fechas = [];

function format(d){
  const pad=n=>String(n).padStart(2,'0');
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()}`;
}

function parseFecha(str){
  const [d,m,y] = str.split('/');
  return new Date(y, m-1, d);
}

function ordenarFechas(arr){
  return arr.sort((a,b)=>parseFecha(a)-parseFecha(b));
}

let fechaActual = "";

function render(fecha){

  document.getElementById("fecha").innerText = fecha;

  const lista = data[fecha] || [];

  const cont = document.getElementById("lista");

  if(lista.length === 0){
    cont.innerHTML = `<div class="empty">Sin farmacias para esta fecha</div>`;
    return;
  }

  cont.innerHTML = "";

  lista.forEach(f => {
    cont.innerHTML += `
      <div class="card">
        <div class="name">${f.farmacia}</div>
        <div class="muted">${f.direccion || ""}</div>
        <div class="muted">${f.telefono || ""}</div>
        <div class="badge">Turno activo</div>
      </div>
    `;
  });
}

function hoy(){
  const h = format(new Date());
  if(data[h]){
    fechaActual = h;
  } else {
    fechaActual = fechas[0]; // fallback seguro
  }
  render(fechaActual);
}

fetch("turnos_hasta_31_12.json")
  .then(r => r.json())
  .then(json => {

    data = json;

    fechas = ordenarFechas(Object.keys(data));

    hoy(); // arranca siempre en hoy

  });
</script>
