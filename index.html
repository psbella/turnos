
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Farmacias MDP">

  <title>Farmacias de Turno · MDP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --accent: #3fb950;
      --accent-dim: rgba(63,185,80,0.12);
      --text: #e6edf3;
      --muted: #7d8590;
      --border: rgba(255,255,255,0.08);
      --radius: 14px;
    }

    body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

    header { border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); z-index: 10; }

    .header-inner {
      max-width: 1100px; margin: 0 auto;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cross { width: 32px; height: 32px; position: relative; flex-shrink: 0; }
    .cross::before, .cross::after { content: ''; position: absolute; background: var(--accent); border-radius: 3px; }
    .cross::before { width: 12px; height: 32px; left: 10px; top: 0; }
    .cross::after  { width: 32px; height: 12px; left: 0; top: 10px; }

    .app-title { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--text); letter-spacing: 1px; }

    .layout {
      max-width: 1100px; margin: 0 auto;
      padding: 24px 24px 60px;
    }

    @media (min-width: 768px) {
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 28px;
      }
    }

    .col-list { min-width: 0; }

    .intro {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      line-height: 1.6;
    }

    .intro strong { color: var(--accent); }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 14px 16px;
      margin-bottom: 10px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card:hover { border-color: rgba(63,185,80,0.35); background: #1a1f2a; }
    .card.active { border-color: var(--accent); background: var(--accent-dim); }

    .card-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      color: var(--accent);
      opacity: 0.7;
      min-width: 32px;
    }

    .card-name { font-weight: 700; font-size: 16px; }

    .card-phone {
      font-size: 12px;
      color: var(--muted);
      margin-left: auto;
    }

    .col-map { display: none; }

    @media (min-width: 768px) {
      .col-map {
        display: block;
        position: sticky;
        top: 90px;
      }
    }

    #map-desktop { height: 400px; width: 100%; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }

    .map-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 20;
    }

    .map-sheet.open { transform: translateY(0); }

    .map-sheet-header {
      padding: 16px;
      font-weight: 700;
      text-align: center;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .map-sheet-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 24px;
      cursor: pointer;
      padding: 0 8px;
    }

    #map-mobile { height: 300px; width: 100%; }

    .badge-ciclo {
      display: inline-block;
      background: var(--accent-dim);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: 8px;
    }

    .stats {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="cross"></div>
    <div class="app-title">Farmacias de Turno</div>
  </div>
</header>

<div class="layout">
  <div class="col-list">
    <div class="intro" id="intro">
      <span>Cargando datos...</span>
    </div>
    <div id="lista"></div>
  </div>

  <div class="col-map">
    <div id="map-desktop"></div>
  </div>
</div>

<div class="map-sheet" id="mapSheet">
  <div class="map-sheet-header">
    <span id="sheetName"></span>
    <button class="map-sheet-close" id="closeSheet">✕</button>
  </div>
  <div id="map-mobile"></div>
</div>

<script>
// ==================== CONFIGURACIÓN ====================
const CONFIG = {
  HORA_CAMBIO: 9,                                  // 9:00 AM
  ZONA_HORARIA: 'America/Argentina/Buenos_Aires', // GMT-3
  TOTAL_CICLOS: 16,                               // 16 ciclos
  RUTA_JSON: 'ciclos_final.json'          // Ruta de tu JSON
};

// ==================== VARIABLES GLOBALES ====================
let ciclosData = {};
let mapDesktop = null;
let mapMobile = null;
let activeCard = null;
let currentMarker = null;
const geoCache = {};

// ==================== UTILIDADES ====================
function pad(n) { 
  return String(n).padStart(2, '0'); 
}

function formatearFechaGMT3() {
  const ahora = new Date();
  const opciones = { timeZone: CONFIG.ZONA_HORARIA };
  return new Date(ahora.toLocaleString('en-US', opciones));
}

function labelFecha(d) {
  const dias = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
  const meses = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
  return `${dias[d.getDay()]} ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

function capFirst(str) {
  if (!str) return '';
  return str.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function formatearTelefono(tel) {
  if (!tel || tel === 'nan' || tel === 'NaN') return '📞 Sin teléfono';
  return `📞 ${tel}`;
}

// ==================== CÁLCULO DE CICLO ====================
function obtenerCicloActual() {
  const fechaGMT3 = formatearFechaGMT3();
  
  // Fecha base: 1 de enero del año actual
  const inicioAnio = new Date(fechaGMT3.getFullYear(), 0, 0);
  const diaDelAnio = Math.floor((fechaGMT3 - inicioAnio) / (1000 * 60 * 60 * 24));
  
  // Ciclo del 1 al 16 (rota diariamente)
  const ciclo = ((diaDelAnio - 1) % CONFIG.TOTAL_CICLOS) + 1;
  
  console.log(`📅 ${labelFecha(fechaGMT3)} | Día #${diaDelAnio} | Ciclo ${ciclo}`);
  return ciclo;
}

// ==================== CARGA DE DATOS ====================
async function cargarDatos() {
  try {
    const response = await fetch(CONFIG.RUTA_JSON);
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    
    ciclosData = await response.json();
    
    const ciclosDisponibles = Object.keys(ciclosData).length;
    console.log(`✅ Cargados ${ciclosDisponibles} ciclos`);
    
    mostrarFarmacias();
    
  } catch (error) {
    console.error('❌ Error cargando JSON:', error);
    document.getElementById('intro').innerHTML = '⚠️ Error cargando datos. Verifica la ruta del JSON.';
  }
}

// ==================== MOSTRAR FARMACIAS ====================
function mostrarFarmacias() {
  const ciclo = obtenerCicloActual();
  const farmacias = ciclosData[ciclo] || [];
  const fechaGMT3 = formatearFechaGMT3();
  
  const intro = document.getElementById('intro');
  const lista = document.getElementById('lista');
  
  if (!farmacias.length) {
    intro.innerHTML = `
      <span>⚠️ No hay datos para el ciclo ${ciclo}</span>
      <div class="stats">📅 ${labelFecha(fechaGMT3)}</div>
    `;
    lista.innerHTML = '<div class="card">Sin farmacias registradas para este ciclo</div>';
    return;
  }
  
  intro.innerHTML = `
    <span>🔄 Ciclo ${ciclo} · Turnos de hoy: <strong>${labelFecha(fechaGMT3)}</strong></span>
    <div class="stats">📊 ${farmacias.length} farmacias de turno</div>
  `;
  
  lista.innerHTML = '';
  
  farmacias.forEach((farmacia, index) => {
    const div = document.createElement('div');
    div.className = 'card';
    
    div.innerHTML = `
  <div class="card-num">${pad(index + 1)}</div>
  <div style="flex:1">
    <div class="card-name">${capFirst(farmacia.nombre)}</div>
    <div style="font-size: 12px; color: var(--muted);">📍 ${farmacia.direccion}</div>
  </div>
  <div class="card-phone">${formatearTelefono(farmacia.telefono)}</div>
`;
    `;
    
    div.onclick = () => {
      if (activeCard) activeCard.classList.remove('active');
      div.classList.add('active');
      activeCard = div;
      mostrarMapa(farmacia.nombre, farmacia.direccion, farmacia.telefono);
    };
    
    lista.appendChild(div);
  });
  
  console.log(`✅ Mostradas ${farmacias.length} farmacias del ciclo ${ciclo}`);
}

// ==================== MAPA ====================
async function geocode(direccion) {
  if (!direccion) return null;
  if (geoCache[direccion]) return geoCache[direccion];
  
  try {
    const query = `${direccion}, Mar del Plata, Buenos Aires, Argentina`;
    const response = await fetch(
      'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' +
      encodeURIComponent(query)
    );
    const data = await response.json();
    
    if (data && data.length > 0) {
      const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
      geoCache[direccion] = coords;
      return coords;
    }
  } catch (error) {
    console.error('Error geocoding:', error);
  }
  return null;
}

function initMapa(mapElement, view, zoom) {
  const map = L.map(mapElement).setView(view, zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
  }).addTo(map);
  return map;
}

async function mostrarMapa(nombre, direccion, telefono) {
  const sheet = document.getElementById('mapSheet');
  const sheetName = document.getElementById('sheetName');
  sheetName.innerHTML = `${capFirst(nombre)}<br><small style="font-size:12px">${direccion}</small>`;
  sheet.classList.add('open');
  
  const coords = await geocode(direccion);
  const view = coords || [-38.0055, -57.5426]; // Centro de MDP
  const zoom = coords ? 16 : 13;
  
  // Mapa desktop
  if (!mapDesktop) {
    mapDesktop = initMapa('map-desktop', view, zoom);
  } else {
    mapDesktop.setView(view, zoom);
    if (currentMarker) mapDesktop.removeLayer(currentMarker);
  }
  
  // Mapa mobile
  if (!mapMobile) {
    mapMobile = initMapa('map-mobile', view, zoom);
  } else {
    mapMobile.setView(view, zoom);
    if (mapMobile._layers) {
      Object.keys(mapMobile._layers).forEach(key => {
        if (mapMobile._layers[key] instanceof L.Marker) {
          mapMobile.removeLayer(mapMobile._layers[key]);
        }
      });
    }
  }
  
  const popupText = `<b>${capFirst(nombre)}</b><br>${direccion}<br>${formatearTelefono(telefono)}`;
  
  if (coords) {
    currentMarker = L.marker(coords).addTo(mapDesktop).bindPopup(popupText).openPopup();
    L.marker(coords).addTo(mapMobile).bindPopup(popupText).openPopup();
  } else {
    currentMarker = L.marker(view).addTo(mapDesktop).bindPopup(popupText + '<br><small>📍 Ubicación aproximada</small>').openPopup();
    L.marker(view).addTo(mapMobile).bindPopup(popupText + '<br><small>📍 Ubicación aproximada</small>').openPopup();
  }
}

// ==================== ACTUALIZACIÓN AUTOMÁTICA ====================
function programarActualizacion() {
  const ahora = formatearFechaGMT3();
  let proxima = new Date(ahora);
  proxima.setHours(CONFIG.HORA_CAMBIO, 0, 0, 0);
  
  if (ahora >= proxima) {
    proxima.setDate(proxima.getDate() + 1);
  }
  
  const tiempoMs = proxima - ahora;
  const minutos = Math.round(tiempoMs / 60000);
  
  console.log(`⏰ Próxima actualización en ${minutos} minutos (${proxima.toLocaleString('es-AR')})`);
  
  setTimeout(() => {
    console.log('🔄 Actualizando farmacias...');
    mostrarFarmacias();
    programarActualizacion();
  }, tiempoMs);
}

// ==================== CIERRE DEL MAPA ====================
document.getElementById('closeSheet').addEventListener('click', () => {
  document.getElementById('mapSheet').classList.remove('open');
});

document.addEventListener('click', (e) => {
  const sheet = document.getElementById('mapSheet');
  if (sheet.classList.contains('open') && !sheet.contains(e.target)) {
    sheet.classList.remove('open');
  }
});

// ==================== INICIALIZACIÓN ====================
async function init() {
  console.log('🚀 Farmacias de Turno - Mar del Plata');
  console.log(`⏰ Zona: ${CONFIG.ZONA_HORARIA} | Cambio a las ${CONFIG.HORA_CAMBIO}:00`);
  await cargarDatos();
  programarActualizacion();
}

init();
</script>

</body>
</html>
