<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test de SVG - Farmacias App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px;
    }
    .light {
      background: #ffffff;
      color: #1f2328;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .card {
      background: #161b22;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid #30363d;
    }
    .light .card {
      background: #ffffff;
      border-color: #d0d7de;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 8px;
    }
    .light .title {
      border-bottom-color: #d0d7de;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 16px;
    }
    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #0d1117;
      border-radius: 12px;
      border: 1px solid #21262d;
    }
    .light .icon-item {
      background: #f6f8fa;
      border-color: #d0d7de;
    }
    .icon-name {
      font-size: 11px;
      text-align: center;
      color: #8b949e;
    }
    .light .icon-name {
      color: #57606a;
    }
    svg {
      width: 32px;
      height: 32px;
    }
    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="container">
  <h1 style="margin-bottom: 20px;">🎨 Test de SVG - App Farmacias</h1>
  <button onclick="document.body.classList.toggle('light')">🌓 Cambiar tema claro/oscuro</button>

  <!-- Íconos principales -->
  <div class="card">
    <div class="title">
      <span>📍</span> Íconos principales
    </div>
    <div class="grid" id="main-icons"></div>
  </div>

  <!-- Botones flotantes -->
  <div class="card">
    <div class="title">
      <span>🔄</span> Botones flotantes
    </div>
    <div class="grid" id="button-icons"></div>
  </div>

  <!-- Alertas y estados -->
  <div class="card">
    <div class="title">
      <span>⚠️</span> Alertas y estados
    </div>
    <div class="grid" id="alert-icons"></div>
  </div>
</div>

<script>
  // ========== ÍCONOS PRINCIPALES ==========
  const mainIcons = [
    { name: 'Farmacia (mapa)', svg: `<svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#3fb950" stroke="white" stroke-width="1.5"/><path d="M12 7L12 13M9 10L15 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>` },
    { name: 'Ubicación (dirección)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="var(--accent, #3fb950)"/><circle cx="12" cy="9" r="3" fill="white"/></svg>` },
    { name: 'Teléfono', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="var(--accent, #3fb950)"/></svg>` },
    { name: 'Reloj (turno vigente)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 8V12L15 15M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" stroke="var(--accent, #3fb950)" stroke-width="1.5" fill="none"/></svg>` },
    { name: 'Estadísticas (check)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 12L10 17L20 7" stroke="var(--accent, #3fb950)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>` }
  ];

  // ========== BOTONES FLOTANTES ==========
  const buttonIcons = [
    { name: 'Ver todas (mapa)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="3"/></svg>` },
    { name: 'Volver a turnos', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M12 3l9 9-9 9"/></svg>` },
    { name: 'Ir arriba', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v16M12 4l-4 4M12 4l4 4"/></svg>` },
    { name: 'Cerrar sheet (X)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>` }
  ];

  // ========== ALERTAS Y ESTADOS ==========
  const alertIcons = [
    { name: 'Sin conexión (wifi off)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f85149" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>` },
    { name: 'Error / Advertencia', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f85149" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="#f85149"/></svg>` },
    { name: 'Calendario (fecha)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>` },
    { name: 'Farmacia (tienda)', svg: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>` },
    { name: 'Google Maps link', svg: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="var(--accent, #3fb950)"/><circle cx="12" cy="9" r="3" fill="white"/></svg>` }
  ];

  function renderIconList(containerId, icons) {
    const container = document.getElementById(containerId);
    container.innerHTML = icons.map(icon => `
      <div class="icon-item">
        ${icon.svg}
        <div class="icon-name">${icon.name}</div>
      </div>
    `).join('');
  }

  renderIconList('main-icons', mainIcons);
  renderIconList('button-icons', buttonIcons);
  renderIconList('alert-icons', alertIcons);
</script>
</body>
</html>
