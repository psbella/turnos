name: Actualizar farmacias

on:
  schedule:
    - cron: "5 12 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar scraper
        run: node scraper.js

      - name: Commit cambios
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add data.json historico.json
          git commit -m "update turnos" || echo "sin cambios"
          git push
