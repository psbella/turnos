name: Minify JS

on:
  push:
    paths:
      - 'js/**'
    branches:
      - main

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install minifier
        run: npm install -g uglify-js
      
      - name: Minify all JS files
        run: |
          for file in js/*.js; do
            uglifyjs "$file" -o "js-min/$(basename "$file")" -c -m
          done
      
      - name: Replace js folder with minified
        run: |
          cp js/*.js js-backup/
          cp js-min/*.js js/
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add js/
          git commit -m "Minificar módulos JS" || echo "No changes"
          git push
