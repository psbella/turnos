<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Corregir farmacias (todo editable)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      margin-bottom: 20px;
      color: #3fb950;
      font-size: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .panel {
      background: #161b22;
      border-radius: 16px;
      border: 1px solid #30363d;
      padding: 20px;
    }
    .farmacia-info {
      margin-bottom: 20px;
    }
    .campo {
      margin-bottom: 15px;
    }
    .campo label {
      display: block;
      font-size: 12px;
      color: #7d8590;
      margin-bottom: 4px;
    }
    .campo input, .campo textarea {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .campo textarea {
      resize: vertical;
    }
    .coordenadas {
      background: #0d1117;
      padding: 12px;
      border-radius: 12px;
      margin: 15px 0;
      font-family: monospace;
      font-size: 12px;
      display: flex;
      gap: 10px;
    }
    .coordenadas input {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 8px;
      border-radius: 8px;
      font-size: 12px;
    }
    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    button {
      background: #3fb950;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    button:hover {
      background: #2c974b;
      transform: translateY(-1px);
    }
    .btn-corregir {
      background: #f0883e;
    }
    .btn-corregir:hover {
      background: #e06b1f;
    }
    .btn-descargar {
      background: #1f6feb;
    }
    .estado {
      background: #0d1117;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      text-align: center;
      font-size: 13px;
    }
    .estado.correcta {
      color: #3fb950;
    }
    .estado.corregida {
      color: #f0883e;
    }
    #map {
      height: 500px;
      border-radius: 16px;
      border: 1px solid #30363d;
    }
    .progress {
      background: #30363d;
      border-radius: 20px;
      height: 8px;
      width: 100%;
      margin: 20px 0;
    }
    .progress-bar {
      background: #3fb950;
      border-radius: 20px;
      height: 8px;
      width: 0%;
      transition: width 0.3s;
    }
    .badge {
      background: #3fb950;
      color: #0d1117;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: bold;
      margin-left: 10px;
    }
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✏️ Editor completo de farmacias</h1>
  <div class="progress">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <div class="grid">
    <!-- Columna izquierda: datos editables -->
    <div class="panel">
      <div class="farmacia-info">
        <h2 id="farm-nombre">Cargando... <span class="badge" id="contador">0/0</span></h2>
      </div>

      <div class="campo">
        <label>🏷️ Nombre</label>
        <input type="text" id="input-nombre" class="edit-field">
      </div>

      <div class="campo">
        <label>📍 Dirección</label>
        <textarea id="input-direccion" rows="2" class="edit-field"></textarea>
      </div>

      <div class="campo">
        <label>📞 Teléfono</label>
        <input type="text" id="input-telefono" class="edit-field">
      </div>

      <div class="coordenadas">
        <input type="text" id="input-lat" placeholder="Latitud" class="edit-field">
        <input type="text" id="input-lng" placeholder="Longitud" class="edit-field">
      </div>

      <div class="buttons">
        <button id="btn-correcta" class="btn-correcta">✅ Guardar y siguiente</button>
        <button id="btn-anterior" class="btn-anterior">⏪ Anterior</button>
        <button id="btn-descargar" class="btn-descargar">💾 Descargar JSON</button>
      </div>

      <div id="estado" class="estado">📍 Editá los campos o mové el pin en el mapa</div>
    </div>

    <!-- Columna derecha: mapa -->
    <div class="panel" style="padding: 0; overflow: hidden;">
      <div id="map"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // ==================== DATOS ====================
  let todasFarmacias = [];
  let currentIndex = 0;
  let currentMarker = null;
  let map = null;
  let cambiosPendientes = false;

  const pharmacyIcon = L.divIcon({
    className: 'custom-pharmacy-icon',
    html: '<svg width="34" height="34" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#3fb950" stroke="white" stroke-width="1.5"/><path d="M12 7L12 13M9 10L15 10" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>',
    iconSize: [34, 34],
    popupAnchor: [0, -17]
  });

  // ==================== CARGAR DATOS ====================
  async function cargarFarmacias() {
    const res = await fetch('db.json');
    const ciclosData = await res.json();
    const unicas = new Map();
    for (const grupo in ciclosData) {
      for (const f of ciclosData[grupo]) {
        const key = `${f.nombre}|${f.direccion}`;
        if (!unicas.has(key)) unicas.set(key, { ...f });
      }
    }
    todasFarmacias = Array.from(unicas.values());
    todasFarmacias.sort((a, b) => a.nombre.localeCompare(b.nombre));
    actualizarProgreso();
    mostrarFarmacia(0);
  }

  // ==================== MOSTRAR FARMACIA ====================
  function mostrarFarmacia(index) {
    if (!todasFarmacias.length || index < 0 || index >= todasFarmacias.length) return;
    const f = todasFarmacias[index];
    
    // Actualizar campos
    document.getElementById('input-nombre').value = f.nombre || '';
    document.getElementById('input-direccion').value = f.direccion || '';
    document.getElementById('input-telefono').value = f.telefono || '';
    document.getElementById('input-lat').value = f.lat ? f.lat.toFixed(6) : '';
    document.getElementById('input-lng').value = f.lng ? f.lng.toFixed(6) : '';
    document.getElementById('farm-nombre').innerHTML = `${f.nombre || '?'} <span class="badge">${index+1}/${todasFarmacias.length}</span>`;
    
    document.getElementById('estado').innerHTML = '✏️ Editá los campos o mové el pin en el mapa';
    document.getElementById('estado').className = 'estado';
    
    actualizarMapa(f);
  }

  // ==================== ACTUALIZAR MAPA ====================
  function actualizarMapa(farmacia) {
    if (!map) {
      map = L.map('map').setView([-38.0055, -57.5426], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(map);
    }

    if (currentMarker) map.removeLayer(currentMarker);

    const lat = parseFloat(document.getElementById('input-lat').value);
    const lng = parseFloat(document.getElementById('input-lng').value);
    const tieneCoords = !isNaN(lat) && !isNaN(lng);
    const pos = tieneCoords ? [lat, lng] : [-38.0055, -57.5426];

    currentMarker = L.marker(pos, { draggable: true, icon: pharmacyIcon }).addTo(map);
    
    currentMarker.on('dragend', () => {
      const newPos = currentMarker.getLatLng();
      document.getElementById('input-lat').value = newPos.lat.toFixed(6);
      document.getElementById('input-lng').value = newPos.lng.toFixed(6);
      actualizarFarmaciaDesdeCampos();
    });

    map.setView(pos, 16);
    currentMarker.bindPopup(`<b>${farmacia.nombre}</b><br>${farmacia.direccion}`).openPopup();
  }

  // ==================== ACTUALIZAR OBJETO DESDE CAMPOS ====================
  function actualizarFarmaciaDesdeCampos() {
    const f = todasFarmacias[currentIndex];
    const nombreNuevo = document.getElementById('input-nombre').value.trim();
    const direccionNueva = document.getElementById('input-direccion').value.trim();
    const telefonoNuevo = document.getElementById('input-telefono').value.trim();
    const latNuevo = parseFloat(document.getElementById('input-lat').value);
    const lngNuevo = parseFloat(document.getElementById('input-lng').value);

    let cambios = false;
    if (nombreNuevo !== f.nombre) { f.nombre = nombreNuevo; cambios = true; }
    if (direccionNueva !== f.direccion) { f.direccion = direccionNueva; cambios = true; }
    if (telefonoNuevo !== f.telefono) { f.telefono = telefonoNuevo; cambios = true; }
    if (!isNaN(latNuevo) && latNuevo !== f.lat) { f.lat = latNuevo; cambios = true; }
    if (!isNaN(lngNuevo) && lngNuevo !== f.lng) { f.lng = lngNuevo; cambios = true; }

    if (cambios) {
      cambiosPendientes = true;
      document.getElementById('estado').innerHTML = '✅ Cambios guardados localmente. Presioná "Descargar JSON" para obtener el archivo.';
      document.getElementById('estado').className = 'estado correcta';
    }
  }

  // ==================== SIGUIENTE ====================
  function siguiente() {
    actualizarFarmaciaDesdeCampos();
    if (currentIndex + 1 < todasFarmacias.length) {
      currentIndex++;
      mostrarFarmacia(currentIndex);
    } else {
      document.getElementById('estado').innerHTML = '🎉 ¡Todas las farmacias revisadas! Descargá el JSON final.';
      document.getElementById('estado').className = 'estado correcta';
    }
    actualizarProgreso();
  }

  // ==================== ANTERIOR ====================
  function anterior() {
    actualizarFarmaciaDesdeCampos();
    if (currentIndex - 1 >= 0) {
      currentIndex--;
      mostrarFarmacia(currentIndex);
      actualizarProgreso();
    }
  }

  // ==================== DESCARGAR JSON ====================
  async function descargarJSON() {
    actualizarFarmaciaDesdeCampos();
    
    const res = await fetch('db.json');
    const ciclosData = await res.json();

    const mapaCoords = new Map();
    for (const f of todasFarmacias) {
      const key = `${f.nombre}|${f.direccion}`;
      mapaCoords.set(key, { 
        nombre: f.nombre,
        direccion: f.direccion,
        telefono: f.telefono,
        lat: f.lat, 
        lng: f.lng 
      });
    }

    for (const grupo in ciclosData) {
      for (const farmacia of ciclosData[grupo]) {
        const key = `${farmacia.nombre}|${farmacia.direccion}`;
        if (mapaCoords.has(key)) {
          const datos = mapaCoords.get(key);
          farmacia.nombre = datos.nombre;
          farmacia.direccion = datos.direccion;
          farmacia.telefono = datos.telefono;
          farmacia.lat = datos.lat;
          farmacia.lng = datos.lng;
        }
      }
    }

    const jsonStr = JSON.stringify(ciclosData, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'db.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    cambiosPendientes = false;
    document.getElementById('estado').innerHTML = '✅ JSON descargado. Reemplazá tu db.json con este archivo.';
  }

  function actualizarProgreso() {
    const porcentaje = ((currentIndex) / todasFarmacias.length) * 100;
    document.getElementById('progress-bar').style.width = `${porcentaje}%`;
  }

  // Escuchar cambios en los campos
  function bindInputEvents() {
    const campos = ['input-nombre', 'input-direccion', 'input-telefono', 'input-lat', 'input-lng'];
    campos.forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        actualizarFarmaciaDesdeCampos();
        const lat = parseFloat(document.getElementById('input-lat').value);
        const lng = parseFloat(document.getElementById('input-lng').value);
        if (!isNaN(lat) && !isNaN(lng) && currentMarker) {
          currentMarker.setLatLng([lat, lng]);
          map.setView([lat, lng], 16);
        }
      });
    });
  }

  // ==================== EVENTOS ====================
  document.getElementById('btn-correcta').addEventListener('click', siguiente);
  document.getElementById('btn-anterior').addEventListener('click', anterior);
  document.getElementById('btn-descargar').addEventListener('click', descargarJSON);

  // ==================== INICIAR ====================
  cargarFarmacias();
  bindInputEvents();
</script>
</body>
</html>
